apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mfr-care

resources:
- deployment.yaml
- service.yaml
- configmap.yaml
- secret.yaml
- serviceaccount.yaml

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: mfr-care
  app.kubernetes.io/version: v1
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: tdk-nurse-project

# Labels transformer
labels:
- pairs:
    app.kubernetes.io/component: backend
  includeSelectors: true
  includeTemplates: true

# Annotations transformer
annotations:
- kind: Deployment
  pairs:
    reloader.stakater.com/auto: "true" # Trigger rollout on ConfigMap changes

# ConfigMapGenerator for dynamic configuration
configMapGenerator:
- name: app-config
  behavior: replace
  options:
    labels:
      app.kubernetes.io/component: config
    annotations:
      reloader.stakater.com/match: "true"

# Image transformer configuration
images:
- name: tdksoft341/tdk-nurse-project-mfr
  newName: tdksoft341/tdk-nurse-project-mfr
  newTag: latest
