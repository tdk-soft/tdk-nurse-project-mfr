apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mfr-care-ingress
  namespace: mfr-care-dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx

    # 1. SSL & Redirection
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # 2. Security Hardening (HSTS & Headers)
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";

    # 3. Optimization for Next.js
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mfr-care.tdksoftconsulting.de
    - www.mfr-care.tdksoftconsulting.de
    secretName: mfr-care-tls-cert
  rules:
  # Rule 1: Root domain
  - host: mfr-care.tdksoftconsulting.de
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mfr-care
            port:
              number: 80
  # Rule 2: WWW subdomain
  - host: www.mfr-care.tdksoftconsulting.de
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mfr-care
            port:
              number: 80
