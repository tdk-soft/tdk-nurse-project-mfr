apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: staging-
commonLabels:
  env: staging
patches:
  - path: patches/resources.yaml
configMapGenerator:
  - name: app-config
    literals:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.staging.tdksoft.com