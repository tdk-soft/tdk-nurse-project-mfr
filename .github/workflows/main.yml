name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Grant write permissions for private repo
permissions:
  contents: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test:unit

  build-and-push:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      docker_tag: ${{ steps.version.outputs.TAG }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=git-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: | 
            ${{ secrets.DOCKERHUB_USERNAME }}/tdk-nurse-mfr:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tdk-nurse-mfr:${{ steps.version.outputs.TAG }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/tdk-nurse-mfr:buildcache
          cache-to: type=inline

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
      
      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.1.0

      - name: Get version tag
        id: get-tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=git-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Update Kubernetes resources
        run: |
          cd k8s/overlays/development
          kustomize edit set image ${{ secrets.DOCKERHUB_USERNAME }}/tdk-nurse-mfr=${{ secrets.DOCKERHUB_USERNAME }}/tdk-nurse-mfr:${{ steps.get-tag.outputs.TAG }}
          
      - name: Commit and push manifest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/overlays/development/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(gitops): update dev image to ${{ steps.get-tag.outputs.TAG }} [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Development
        run: |
          cd k8s/overlays/development
          kubectl apply -k .
          kubectl rollout status deployment/mfr-care-dev -n mfr-care-dev --timeout=5m